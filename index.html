<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Michler Civil War Maps – Live GPS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: -apple-system, sans-serif; background: #111; }

  #map { position: absolute; top: 0; left: 0; right: 0; bottom: 88px; }

  #controls {
    position: absolute; bottom: 0; left: 0; right: 0; height: 88px;
    background: #111; color: #eee;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 7px; padding: 8px 12px; z-index: 1000;
    border-top: 1px solid #2a2a2a;
  }

  #btn-row { display: flex; gap: 8px; }

  button {
    padding: 9px 16px; border: none; border-radius: 9px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  #btn-center  { background: #2563eb; color: #fff; }
  #btn-toggle  { background: #374151; color: #e5e7eb; }
  #btn-opacity { background: #374151; color: #e5e7eb; }

  #coords {
    font-size: 12px; color: #9ca3af; text-align: center; line-height: 1.5;
  }

  #status-bar {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.78); color: #fff; padding: 6px 16px;
    border-radius: 20px; font-size: 12px; z-index: 999;
    max-width: 92vw; text-align: center; pointer-events: none;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .gps-dot {
    width: 16px; height: 16px;
    background: #ef4444; border: 3px solid #fff; border-radius: 50%;
    box-shadow: 0 0 0 3px rgba(239,68,68,0.35);
  }
</style>
</head>
<body>

<div id="map"></div>
<div id="status-bar">Loading…</div>

<div id="controls">
  <div id="btn-row">
    <button id="btn-center">📍 My Location</button>
    <button id="btn-toggle">🗺 Show Streets</button>
    <button id="btn-opacity">☀️ Opacity</button>
  </div>
  <div id="coords">Waiting for GPS signal…</div>
</div>

<script>
const BASE = 'https://tiles.arcgis.com/tiles/fBc8EJBxQRMcHlei/arcgis/rest/services';
const BLANK = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';

// All 30 sheets with precise bounding boxes extracted from HAR tile coordinates.
// Format: [name, minLat, maxLat, minLon, maxLon]
const SHEETS = [
  ['01_Hatchers_Run__Vaughan_Road_jpg',              37.1603, 37.4400, -77.6953, -77.5195],
  ['02_Jerusalem_Plank_Road_South_jpg',              37.1603, 37.4400, -77.6953, -77.3438],
  ['03_Boydton_Plank_Road_Fort_Fisher_jpg',          37.3003, 37.4400, -77.6953, -77.5195],
  ['04_Fort_Sedgwick_to_Fort_Wadsworth_jpg',         37.3003, 37.4400, -77.6953, -77.3438],
  ['05_Appomattox_River_West_Matoax_jpg',            37.3003, 37.4400, -77.6953, -77.5195],
  ['06_Petersburg_jpg',                              37.3003, 37.4400, -77.6953, -77.3438],
  ['07_Swift_Creek_jpg',                             37.3003, 37.4400, -77.6953, -77.4316],
  ['08_Appomattox_River_North_Fort_Clifton_jpg',     37.3003, 37.4400, -77.6953, -77.3438],
  ['09_Richmond___Petersburg_R_R__Unfinished__jpg',  37.3003, 37.4400, -77.6953, -77.4316],
  ['10_Point_of_Rocks_jpg',                          37.3003, 37.4400, -77.6953, -77.3438],
  ['11_Howlett_Line_Bermuda_Hundred_jpg',            37.3702, 37.4400, -77.5195, -77.4316],
  ['12_Bermuda_Hundred_Curles__Neck_jpg',            37.3702, 37.4400, -77.6953, -77.2559],
  ['13_Chesterfield_Court_House_jpg',                37.3702, 37.4400, -77.6953, -77.4316],
  ['14_Drewry_s__Ft__Harrison__Ft__Brady_jpg',       37.3702, 37.4400, -77.6953, -77.3438],
  ['15_Malvern_Hill_jpg',                            37.3702, 37.4400, -77.3438, -77.2559],
  ['16_James_River__South_of_Richmond__jpg',         37.4400, 37.7186, -77.6953, -77.4316],
  ['17_Fort_Gilmer_jpg',                             37.4400, 37.7186, -77.6953, -77.3438],
  ['18_White_Oak_Swamp_Glendale_jpg',                37.4400, 37.7186, -77.3438, -77.1680],
  ['19_Richmond___Manchester_jpg',                   37.5097, 37.7186, -77.6953, -77.4316],
  ['20_Seven_Pines_Fair_Oaks_jpg',                   37.5097, 37.7186, -77.6953, -77.2559],
  ['21_Meadow_Station_Bottom_s_Bridge_jpg',          37.5097, 37.7186, -77.3438, -77.2559],
  ['22_Richmond___West_jpg',                         37.5794, 37.7186, -77.6953, -77.5195],
  ['23_Richmond___North_jpg',                        37.5794, 37.7186, -77.6953, -77.4316],
  ['24_Cold_Harbor___South_jpg',                     37.5794, 37.7186, -77.6953, -77.2559],
  ['25_Southeast_of_Cold_Harbor_NARA_jpg',           37.5794, 37.7186, -77.3438, -77.1680],
  ['26_Staples__Mill_Yellow_Tavern_jpg',             37.6490, 37.7186, -77.6953, -77.5195],
  ['27_Mechanicsville_Beaver_Dam_Creek_jpg',         37.6490, 37.7186, -77.6953, -77.3438],
  ['28_Cold_Harbor___North_jpg',                     37.6490, 37.7186, -77.3438, -77.2559],
  ['Michler_Five_Forks_jpg',                         37.1603, 37.3003, -77.6953, -77.5195],
  ['Totopotomoy__1864__Sheet',                       37.6490, 37.9962, -77.6953, -77.2559],
];

// ── Map init ──────────────────────────────────────────────────────────────
const RICHMOND = [37.5407, -77.4360];

const map = L.map('map', {
  center: RICHMOND, zoom: 12,
  zoomControl: true, attributionControl: true
});

const cartoLayer = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {
    attribution: '© <a href="https://carto.com">CARTO</a> © <a href="https://openstreetmap.org">OSM</a>',
    subdomains: 'abcd', maxZoom: 19
  }
);
cartoLayer.addTo(map);

// ── Status bar ────────────────────────────────────────────────────────────
const statusEl = document.getElementById('status-bar');
let statusTimer = null;
function showStatus(msg, dur = 3000) {
  statusEl.textContent = msg;
  statusEl.style.display = 'block';
  clearTimeout(statusTimer);
  if (dur > 0) statusTimer = setTimeout(() => { statusEl.style.display = 'none'; }, dur);
}

// ── Dynamic layer management ──────────────────────────────────────────────
// Only the sheets that intersect the current map viewport are added to the
// map at any one time. As you pan/zoom, sheets are added and removed.
// This keeps iPhone memory usage low — typically 2–5 active layers max.

let michlerOpacity = 0.85;
let michlerVisible = true;
const activeLayers = new Map(); // name -> L.tileLayer

function sheetIntersectsView(sheet, bounds) {
  const [, minLat, maxLat, minLon, maxLon] = sheet;
  return !(maxLat < bounds.getSouth() ||
           minLat > bounds.getNorth() ||
           maxLon < bounds.getWest()  ||
           minLon > bounds.getEast());
}

function updateVisibleSheets() {
  if (!michlerVisible) return;

  // Add a small padding so sheets load slightly before they scroll into view
  const bounds = map.getBounds().pad(0.15);

  const needed = new Set(
    SHEETS
      .filter(s => sheetIntersectsView(s, bounds))
      .map(s => s[0])
  );

  // Remove layers that have scrolled out of view
  for (const [name, layer] of activeLayers) {
    if (!needed.has(name)) {
      map.removeLayer(layer);
      activeLayers.delete(name);
    }
  }

  // Add layers that have scrolled into view
  for (const name of needed) {
    if (!activeLayers.has(name)) {
      const layer = L.tileLayer(`${BASE}/${name}/MapServer/tile/{z}/{y}/{x}`, {
        maxZoom: 19,
        opacity: michlerOpacity,
        attribution: 'Michler Maps · NPS / National Archives',
        crossOrigin: true,
        errorTileUrl: BLANK
      });
      layer.addTo(map);
      activeLayers.set(name, layer);
    }
  }

  const count = activeLayers.size;
  if (count > 0) {
    showStatus(`${count} map sheet${count > 1 ? 's' : ''} in view`, 1500);
  }
}

// Update sheets on every map move, debounced slightly for performance
let moveTimer = null;
map.on('moveend zoomend', () => {
  clearTimeout(moveTimer);
  moveTimer = setTimeout(updateVisibleSheets, 200);
});

// Initial load
updateVisibleSheets();

// ── Opacity cycling ───────────────────────────────────────────────────────
const opacitySteps = [0.85, 0.6, 0.35, 1.0];
let opacityIdx = 0;
document.getElementById('btn-opacity').addEventListener('click', () => {
  opacityIdx = (opacityIdx + 1) % opacitySteps.length;
  michlerOpacity = opacitySteps[opacityIdx];
  for (const layer of activeLayers.values()) layer.setOpacity(michlerOpacity);
  showStatus(`Opacity: ${Math.round(michlerOpacity * 100)}%`, 1500);
});

// ── Layer toggle ──────────────────────────────────────────────────────────
const toggleBtn = document.getElementById('btn-toggle');
toggleBtn.addEventListener('click', () => {
  if (michlerVisible) {
    for (const layer of activeLayers.values()) map.removeLayer(layer);
    michlerVisible = false;
    toggleBtn.textContent = '🗺 Show Michler';
    showStatus('Showing street map only', 1500);
  } else {
    michlerVisible = true;
    toggleBtn.textContent = '🗺 Show Streets';
    updateVisibleSheets();
    showStatus('Showing Michler historical maps', 1500);
  }
});

// ── GPS ───────────────────────────────────────────────────────────────────
let gpsMarker = null;
let accuracyCircle = null;
let firstFix = true;

const gpsIcon = L.divIcon({
  className: '',
  html: '<div class="gps-dot"></div>',
  iconSize: [16, 16], iconAnchor: [8, 8]
});

function onPosition(pos) {
  const { latitude: lat, longitude: lng, accuracy } = pos.coords;
  document.getElementById('coords').textContent =
    `${lat.toFixed(6)}°N   ${lng.toFixed(6)}°W   ±${Math.round(accuracy)} m`;

  if (!gpsMarker) {
    gpsMarker = L.marker([lat, lng], { icon: gpsIcon, zIndexOffset: 2000 }).addTo(map);
    accuracyCircle = L.circle([lat, lng], {
      radius: accuracy, color: '#ef4444', fillColor: '#ef4444',
      fillOpacity: 0.08, weight: 1.5
    }).addTo(map);
  } else {
    gpsMarker.setLatLng([lat, lng]);
    accuracyCircle.setLatLng([lat, lng]).setRadius(accuracy);
  }

  if (firstFix) {
    map.setView([lat, lng], 14);
    firstFix = false;
    showStatus('GPS lock ✓', 2000);
  }
}

function onGpsError(err) {
  const msgs = {
    1: 'Location denied — enable in Safari Settings → Privacy → Location',
    2: 'Position unavailable',
    3: 'GPS timed out — retrying…'
  };
  showStatus(msgs[err.code] || err.message, 5000);
  document.getElementById('coords').textContent = 'GPS unavailable';
}

if (navigator.geolocation) {
  showStatus('Acquiring GPS…', 0);
  navigator.geolocation.watchPosition(onPosition, onGpsError, {
    enableHighAccuracy: true, timeout: 20000, maximumAge: 0
  });
} else {
  showStatus('Geolocation not supported', 0);
}

document.getElementById('btn-center').addEventListener('click', () => {
  if (gpsMarker) {
    map.setView(gpsMarker.getLatLng(), Math.max(map.getZoom(), 15));
  } else {
    showStatus('No GPS fix yet', 2000);
  }
});
</script>
</body>
</html>
