<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Michler Civil War Maps – Live GPS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: -apple-system, sans-serif; background: #111; }

  #map { position: absolute; top: 0; left: 0; right: 0; bottom: 88px; }

  #controls {
    position: absolute; bottom: 0; left: 0; right: 0; height: 88px;
    background: #111; color: #eee;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 7px; padding: 8px 12px; z-index: 1000;
    border-top: 1px solid #2a2a2a;
  }

  #btn-row { display: flex; gap: 8px; }

  button {
    padding: 9px 16px; border: none; border-radius: 9px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  #btn-center  { background: #2563eb; color: #fff; }
  #btn-toggle  { background: #374151; color: #e5e7eb; }
  #btn-opacity { background: #374151; color: #e5e7eb; }

  #coords {
    font-size: 12px; color: #9ca3af; text-align: center; line-height: 1.5;
  }

  #status-bar {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.78); color: #fff; padding: 6px 16px;
    border-radius: 20px; font-size: 12px; z-index: 999;
    max-width: 92vw; text-align: center; pointer-events: none;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .gps-dot {
    width: 16px; height: 16px;
    background: #ef4444; border: 3px solid #fff; border-radius: 50%;
    box-shadow: 0 0 0 3px rgba(239,68,68,0.35);
  }
</style>
</head>
<body>

<div id="map"></div>
<div id="status-bar">Loading Michler maps…</div>

<div id="controls">
  <div id="btn-row">
    <button id="btn-center">📍 My Location</button>
    <button id="btn-toggle">🗺 Show Streets</button>
    <button id="btn-opacity">☀️ Opacity</button>
  </div>
  <div id="coords">Waiting for GPS signal…</div>
</div>

<script>
// ── All 30 service names confirmed directly from NPS tile server (via HAR) ─
const BASE = 'https://tiles.arcgis.com/tiles/fBc8EJBxQRMcHlei/arcgis/rest/services';

const SHEETS = [
  '01_Hatchers_Run__Vaughan_Road_jpg',
  '02_Jerusalem_Plank_Road_South_jpg',
  '03_Boydton_Plank_Road_Fort_Fisher_jpg',
  '04_Fort_Sedgwick_to_Fort_Wadsworth_jpg',
  '05_Appomattox_River_West_Matoax_jpg',
  '06_Petersburg_jpg',
  '07_Swift_Creek_jpg',
  '08_Appomattox_River_North_Fort_Clifton_jpg',
  '09_Richmond___Petersburg_R_R__Unfinished__jpg',
  '10_Point_of_Rocks_jpg',
  '11_Howlett_Line_Bermuda_Hundred_jpg',
  '12_Bermuda_Hundred_Curles__Neck_jpg',
  '13_Chesterfield_Court_House_jpg',
  '14_Drewry_s__Ft__Harrison__Ft__Brady_jpg',
  '15_Malvern_Hill_jpg',
  '16_James_River__South_of_Richmond__jpg',
  '17_Fort_Gilmer_jpg',
  '18_White_Oak_Swamp_Glendale_jpg',
  '19_Richmond___Manchester_jpg',
  '20_Seven_Pines_Fair_Oaks_jpg',
  '21_Meadow_Station_Bottom_s_Bridge_jpg',
  '22_Richmond___West_jpg',
  '23_Richmond___North_jpg',
  '24_Cold_Harbor___South_jpg',
  '25_Southeast_of_Cold_Harbor_NARA_jpg',
  '26_Staples__Mill_Yellow_Tavern_jpg',
  '27_Mechanicsville_Beaver_Dam_Creek_jpg',
  '28_Cold_Harbor___North_jpg',
  'Michler_Five_Forks_jpg',
  'Totopotomoy__1864__Sheet',
];

// ── Map init ──────────────────────────────────────────────────────────────
const RICHMOND = [37.5407, -77.4360];

const map = L.map('map', {
  center: RICHMOND, zoom: 12,
  zoomControl: true, attributionControl: true
});

// CartoDB Positron — works from local files, no Referer restriction,
// light gray so it doesn't compete visually with the sepia Michler sheets.
const cartoLayer = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {
    attribution: '© <a href="https://carto.com">CARTO</a> © <a href="https://openstreetmap.org">OSM</a>',
    subdomains: 'abcd',
    maxZoom: 19
  }
);
cartoLayer.addTo(map);

// ── Michler overlay — all 30 sheets stacked ───────────────────────────────
let michlerOpacity = 0.85;
const michlerLayers = [];
const BLANK = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';

SHEETS.forEach(name => {
  const layer = L.tileLayer(`${BASE}/${name}/MapServer/tile/{z}/{y}/{x}`, {
    maxZoom: 19,
    opacity: michlerOpacity,
    attribution: 'Michler Maps · NPS / National Archives',
    crossOrigin: true,
    errorTileUrl: BLANK  // silently blank outside each sheet's geographic extent
  });
  michlerLayers.push(layer);
  layer.addTo(map);
});

let michlerVisible = true;

// ── Status bar ────────────────────────────────────────────────────────────
const statusEl = document.getElementById('status-bar');
let statusTimer = null;
function showStatus(msg, dur = 3000) {
  statusEl.textContent = msg;
  statusEl.style.display = 'block';
  clearTimeout(statusTimer);
  if (dur > 0) statusTimer = setTimeout(() => { statusEl.style.display = 'none'; }, dur);
}

let tilesLoaded = 0;
michlerLayers.forEach(l => {
  l.once('tileload', () => {
    tilesLoaded++;
    if (tilesLoaded === 1) showStatus('✅ Michler maps loading…', 0);
    if (tilesLoaded === michlerLayers.length) showStatus('✅ All 30 sheets loaded', 3000);
  });
});
setTimeout(() => {
  if (tilesLoaded === 0) showStatus('Zoom in toward Richmond to see map sheets', 4000);
}, 8000);

// ── Opacity cycling ───────────────────────────────────────────────────────
const opacitySteps = [0.85, 0.6, 0.35, 1.0];
let opacityIdx = 0;
document.getElementById('btn-opacity').addEventListener('click', () => {
  opacityIdx = (opacityIdx + 1) % opacitySteps.length;
  michlerOpacity = opacitySteps[opacityIdx];
  michlerLayers.forEach(l => l.setOpacity(michlerOpacity));
  showStatus(`Opacity: ${Math.round(michlerOpacity * 100)}%`, 1500);
});

// ── Layer toggle ──────────────────────────────────────────────────────────
const toggleBtn = document.getElementById('btn-toggle');
toggleBtn.addEventListener('click', () => {
  if (michlerVisible) {
    michlerLayers.forEach(l => map.removeLayer(l));
    michlerVisible = false;
    toggleBtn.textContent = '🗺 Show Michler';
    showStatus('Showing street map only', 1500);
  } else {
    michlerLayers.forEach(l => l.addTo(map));
    michlerVisible = true;
    toggleBtn.textContent = '🗺 Show Streets';
    showStatus('Showing Michler historical maps', 1500);
  }
});

// ── GPS ───────────────────────────────────────────────────────────────────
let gpsMarker = null;
let accuracyCircle = null;
let firstFix = true;

const gpsIcon = L.divIcon({
  className: '',
  html: '<div class="gps-dot"></div>',
  iconSize: [16, 16], iconAnchor: [8, 8]
});

function onPosition(pos) {
  const { latitude: lat, longitude: lng, accuracy } = pos.coords;
  document.getElementById('coords').textContent =
    `${lat.toFixed(6)}°N   ${lng.toFixed(6)}°W   ±${Math.round(accuracy)} m`;

  if (!gpsMarker) {
    gpsMarker = L.marker([lat, lng], { icon: gpsIcon, zIndexOffset: 2000 }).addTo(map);
    accuracyCircle = L.circle([lat, lng], {
      radius: accuracy, color: '#ef4444', fillColor: '#ef4444',
      fillOpacity: 0.08, weight: 1.5
    }).addTo(map);
  } else {
    gpsMarker.setLatLng([lat, lng]);
    accuracyCircle.setLatLng([lat, lng]).setRadius(accuracy);
  }

  if (firstFix) {
    map.setView([lat, lng], 14);
    firstFix = false;
    showStatus('GPS lock ✓', 2000);
  }
}

function onGpsError(err) {
  const msgs = {
    1: 'Location denied — enable in Safari Settings → Privacy → Location',
    2: 'Position unavailable',
    3: 'GPS timed out — retrying…'
  };
  showStatus(msgs[err.code] || err.message, 5000);
  document.getElementById('coords').textContent = 'GPS unavailable';
}

if (navigator.geolocation) {
  showStatus('Acquiring GPS…', 0);
  navigator.geolocation.watchPosition(onPosition, onGpsError, {
    enableHighAccuracy: true, timeout: 20000, maximumAge: 0
  });
} else {
  showStatus('Geolocation not supported', 0);
}

document.getElementById('btn-center').addEventListener('click', () => {
  if (gpsMarker) {
    map.setView(gpsMarker.getLatLng(), Math.max(map.getZoom(), 15));
  } else {
    showStatus('No GPS fix yet', 2000);
  }
});
</script>
</body>
</html>
