<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Michler Civil War Maps – Live GPS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: -apple-system, sans-serif; background: #1a1a1a; }

  #map { position: absolute; top: 0; left: 0; right: 0; bottom: 88px; }

  #controls {
    position: absolute; bottom: 0; left: 0; right: 0; height: 88px;
    background: #1a1a1a; border-top: 1px solid #333;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px; padding: 8px 12px; z-index: 1000;
  }

  #btn-row { display: flex; gap: 8px; }

  button {
    padding: 10px 16px; border: none; border-radius: 9px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s;
  }
  button:active { opacity: 0.7; }

  #btn-center  { background: #2563eb; color: #fff; }
  #btn-toggle  { background: #4b5563; color: #f3f4f6; }
  #btn-opacity { background: #4b5563; color: #f3f4f6; }

  #coords {
    font-size: 12px; color: #9ca3af; text-align: center;
  }

  #status-bar {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.75); color: #fff;
    padding: 6px 16px; border-radius: 20px;
    font-size: 12px; z-index: 999; pointer-events: none;
    max-width: 90vw; text-align: center;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    display: none;
  }

  .gps-dot {
    width: 16px; height: 16px;
    background: #ef4444; border: 3px solid #fff; border-radius: 50%;
    box-shadow: 0 0 0 3px rgba(239,68,68,0.4);
  }
</style>
</head>
<body>
<div id="map"></div>
<div id="status-bar"></div>
<div id="controls">
  <div id="btn-row">
    <button id="btn-center">📍 My Location</button>
    <button id="btn-toggle">🗺 Show Streets</button>
    <button id="btn-opacity">☀️ Opacity</button>
  </div>
  <div id="coords">Waiting for GPS…</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// CONFIGURATION
// ═══════════════════════════════════════════════════════════════════════════

const BASE = 'https://tiles.arcgis.com/tiles/fBc8EJBxQRMcHlei/arcgis/rest/services';

// NPS tile servers have tiles up to zoom 16.
// Setting maxNativeZoom=16 + maxZoom=19 means Leaflet stretches zoom-16
// tiles when you zoom in further — the map stays visible at all zoom levels.
const MAX_NATIVE_ZOOM = 16;
const MAX_ZOOM = 19;

// Never load more than this many Michler layers simultaneously.
// The GPS location sheet is always loaded regardless of this cap.
const MAX_SIMULTANEOUS = 5;

// Blank transparent gif — used as errorTileUrl so missing tiles
// (outside a sheet's geographic extent) are silently invisible.
const BLANK = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';

// All 30 sheets. Service names confirmed directly from NPS tile server via HAR.
// Bounding boxes derived from tile coordinates in the same HAR file.
// Format: { name, minLat, maxLat, minLon, maxLon }
const SHEETS = [
  { name: '01_Hatchers_Run__Vaughan_Road_jpg',             minLat: 37.1603, maxLat: 37.4400, minLon: -77.6953, maxLon: -77.5195 },
  { name: '02_Jerusalem_Plank_Road_South_jpg',             minLat: 37.1603, maxLat: 37.4400, minLon: -77.6953, maxLon: -77.3438 },
  { name: '03_Boydton_Plank_Road_Fort_Fisher_jpg',         minLat: 37.3003, maxLat: 37.4400, minLon: -77.6953, maxLon: -77.5195 },
  { name: '04_Fort_Sedgwick_to_Fort_Wadsworth_jpg',        minLat: 37.3003, maxLat: 37.4400, minLon: -77.6953, maxLon: -77.3438 },
  { name: '05_Appomattox_River_West_Matoax_jpg',           minLat: 37.3003, maxLat: 37.4400, minLon: -77.6953, maxLon: -77.5195 },
  { name: '06_Petersburg_jpg',                             minLat: 37.3003, maxLat: 37.4400, minLon: -77.6953, maxLon: -77.3438 },
  { name: '07_Swift_Creek_jpg',                            minLat: 37.3003, maxLat: 37.4400, minLon: -77.6953, maxLon: -77.4316 },
  { name: '08_Appomattox_River_North_Fort_Clifton_jpg',    minLat: 37.3003, maxLat: 37.4400, minLon: -77.6953, maxLon: -77.3438 },
  { name: '09_Richmond___Petersburg_R_R__Unfinished__jpg', minLat: 37.3003, maxLat: 37.4400, minLon: -77.6953, maxLon: -77.4316 },
  { name: '10_Point_of_Rocks_jpg',                         minLat: 37.3003, maxLat: 37.4400, minLon: -77.6953, maxLon: -77.3438 },
  { name: '11_Howlett_Line_Bermuda_Hundred_jpg',           minLat: 37.3702, maxLat: 37.4400, minLon: -77.5195, maxLon: -77.4316 },
  { name: '12_Bermuda_Hundred_Curles__Neck_jpg',           minLat: 37.3702, maxLat: 37.4400, minLon: -77.6953, maxLon: -77.2559 },
  { name: '13_Chesterfield_Court_House_jpg',               minLat: 37.3702, maxLat: 37.4400, minLon: -77.6953, maxLon: -77.4316 },
  { name: '14_Drewry_s__Ft__Harrison__Ft__Brady_jpg',      minLat: 37.3702, maxLat: 37.4400, minLon: -77.6953, maxLon: -77.3438 },
  { name: '15_Malvern_Hill_jpg',                           minLat: 37.3702, maxLat: 37.4400, minLon: -77.3438, maxLon: -77.2559 },
  { name: '16_James_River__South_of_Richmond__jpg',        minLat: 37.4400, maxLat: 37.7186, minLon: -77.6953, maxLon: -77.4316 },
  { name: '17_Fort_Gilmer_jpg',                            minLat: 37.4400, maxLat: 37.7186, minLon: -77.6953, maxLon: -77.3438 },
  { name: '18_White_Oak_Swamp_Glendale_jpg',               minLat: 37.4400, maxLat: 37.7186, minLon: -77.3438, maxLon: -77.1680 },
  { name: '19_Richmond___Manchester_jpg',                  minLat: 37.5097, maxLat: 37.7186, minLon: -77.6953, maxLon: -77.4316 },
  { name: '20_Seven_Pines_Fair_Oaks_jpg',                  minLat: 37.5097, maxLat: 37.7186, minLon: -77.6953, maxLon: -77.2559 },
  { name: '21_Meadow_Station_Bottom_s_Bridge_jpg',         minLat: 37.5097, maxLat: 37.7186, minLon: -77.3438, maxLon: -77.2559 },
  { name: '22_Richmond___West_jpg',                        minLat: 37.5794, maxLat: 37.7186, minLon: -77.6953, maxLon: -77.5195 },
  { name: '23_Richmond___North_jpg',                       minLat: 37.5794, maxLat: 37.7186, minLon: -77.6953, maxLon: -77.4316 },
  { name: '24_Cold_Harbor___South_jpg',                    minLat: 37.5794, maxLat: 37.7186, minLon: -77.6953, maxLon: -77.2559 },
  { name: '25_Southeast_of_Cold_Harbor_NARA_jpg',          minLat: 37.5794, maxLat: 37.7186, minLon: -77.3438, maxLon: -77.1680 },
  { name: '26_Staples__Mill_Yellow_Tavern_jpg',            minLat: 37.6490, maxLat: 37.7186, minLon: -77.6953, maxLon: -77.5195 },
  { name: '27_Mechanicsville_Beaver_Dam_Creek_jpg',        minLat: 37.6490, maxLat: 37.7186, minLon: -77.6953, maxLon: -77.3438 },
  { name: '28_Cold_Harbor___North_jpg',                    minLat: 37.6490, maxLat: 37.7186, minLon: -77.3438, maxLon: -77.2559 },
  { name: 'Michler_Five_Forks_jpg',                        minLat: 37.1603, maxLat: 37.3003, minLon: -77.6953, maxLon: -77.5195 },
  { name: 'Totopotomoy__1864__Sheet',                      minLat: 37.6490, maxLat: 37.9962, minLon: -77.6953, maxLon: -77.2559 },
];

// ═══════════════════════════════════════════════════════════════════════════
// MAP SETUP
// ═══════════════════════════════════════════════════════════════════════════

const map = L.map('map', {
  center: [37.5407, -77.4360],  // Richmond, VA
  zoom: 15,
  zoomControl: true,
  attributionControl: true
});

// CartoDB Positron — light grey streets, no Referer restriction,
// works when file is served from GitHub Pages or locally.
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://carto.com">CARTO</a> © <a href="https://openstreetmap.org">OSM</a>',
  subdomains: 'abcd',
  maxZoom: MAX_ZOOM
}).addTo(map);

// ═══════════════════════════════════════════════════════════════════════════
// STATUS BAR
// ═══════════════════════════════════════════════════════════════════════════

const statusEl = document.getElementById('status-bar');
let statusTimer = null;
function showStatus(msg, dur = 3000) {
  clearTimeout(statusTimer);
  statusEl.textContent = msg;
  statusEl.style.display = 'block';
  if (dur > 0) statusTimer = setTimeout(() => { statusEl.style.display = 'none'; }, dur);
}

// ═══════════════════════════════════════════════════════════════════════════
// MICHLER LAYER MANAGER
// ═══════════════════════════════════════════════════════════════════════════

// State
let michlerOn = true;          // whether Michler overlay is toggled on
let michlerOpacity = 0.85;     // current opacity
let gpsLatLng = null;          // last known GPS position (L.LatLng or null)

// Map of sheet name -> active L.tileLayer (only loaded sheets are in here)
const activeLayers = new Map();

// Create a fresh tile layer for a sheet
function createLayer(sheet) {
  return L.tileLayer(`${BASE}/${sheet.name}/MapServer/tile/{z}/{y}/{x}`, {
    maxNativeZoom: MAX_NATIVE_ZOOM,
    maxZoom: MAX_ZOOM,
    opacity: michlerOpacity,
    attribution: 'Michler Maps · NPS / National Archives',
    crossOrigin: true,
    errorTileUrl: BLANK
  });
}

// Does a sheet's bounding box contain a lat/lng point?
function sheetContainsPoint(sheet, latlng) {
  return latlng &&
    latlng.lat >= sheet.minLat && latlng.lat <= sheet.maxLat &&
    latlng.lng >= sheet.minLon && latlng.lng <= sheet.maxLon;
}

// Does a sheet's bounding box intersect the given map bounds?
function sheetIntersectsBounds(sheet, bounds) {
  return !(sheet.maxLat < bounds.getSouth() ||
           sheet.minLat > bounds.getNorth() ||
           sheet.maxLon < bounds.getWest()  ||
           sheet.minLon > bounds.getEast());
}

// Squared distance from sheet centre to a latlng (for sorting by proximity)
function distSq(sheet, latlng) {
  const dlat = (sheet.minLat + sheet.maxLat) / 2 - latlng.lat;
  const dlon = (sheet.minLon + sheet.maxLon) / 2 - latlng.lng;
  return dlat * dlat + dlon * dlon;
}

// Core update function — called after every map move/zoom and every GPS fix.
// Decides which sheets should be active and adds/removes layers accordingly.
function updateLayers() {

  // If Michler is toggled off, remove everything and stop.
  if (!michlerOn) {
    for (const [, layer] of activeLayers) map.removeLayer(layer);
    activeLayers.clear();
    return;
  }

  const bounds = map.getBounds().pad(0.1);
  const center = map.getCenter();

  // 1. Find GPS sheet — the sheet containing the user's GPS dot (if any).
  //    This sheet is always loaded regardless of the cap.
  const gpsSheet = gpsLatLng
    ? SHEETS.find(s => sheetContainsPoint(s, gpsLatLng))
    : null;

  // 2. Find all sheets that intersect the current viewport,
  //    sorted by distance to map centre (nearest first).
  const viewSheets = SHEETS
    .filter(s => sheetIntersectsBounds(s, bounds))
    .sort((a, b) => distSq(a, center) - distSq(b, center));

  // 3. Build the wanted set:
  //    - GPS sheet first (guaranteed slot)
  //    - Then fill remaining slots from viewport sheets
  const wanted = new Set();
  if (gpsSheet) wanted.add(gpsSheet.name);
  for (const s of viewSheets) {
    if (wanted.size >= MAX_SIMULTANEOUS) break;
    wanted.add(s.name);
  }

  // 4. Remove layers that are no longer wanted
  for (const [name, layer] of activeLayers) {
    if (!wanted.has(name)) {
      map.removeLayer(layer);
      activeLayers.delete(name);
    }
  }

  // 5. Add layers that are newly wanted
  for (const name of wanted) {
    if (!activeLayers.has(name)) {
      const sheet = SHEETS.find(s => s.name === name);
      const layer = createLayer(sheet);
      layer.addTo(map);
      activeLayers.set(name, layer);
    }
  }
}

// Trigger update on map move/zoom (debounced)
let moveTimer = null;
map.on('moveend zoomend', () => {
  clearTimeout(moveTimer);
  moveTimer = setTimeout(updateLayers, 200);
});

// Initial load
updateLayers();

// ═══════════════════════════════════════════════════════════════════════════
// BUTTONS
// ═══════════════════════════════════════════════════════════════════════════

// Toggle Michler on/off
const toggleBtn = document.getElementById('btn-toggle');
toggleBtn.addEventListener('click', () => {
  michlerOn = !michlerOn;
  if (michlerOn) {
    toggleBtn.textContent = '🗺 Show Streets';
    updateLayers();
    showStatus('Michler maps on', 1500);
  } else {
    updateLayers();  // this removes all layers when michlerOn=false
    toggleBtn.textContent = '🗺 Show Michler';
    showStatus('Street map only', 1500);
  }
});

// Cycle opacity
const opacitySteps = [0.85, 0.65, 0.4, 1.0];
let opacityIdx = 0;
document.getElementById('btn-opacity').addEventListener('click', () => {
  opacityIdx = (opacityIdx + 1) % opacitySteps.length;
  michlerOpacity = opacitySteps[opacityIdx];
  for (const [, layer] of activeLayers) layer.setOpacity(michlerOpacity);
  showStatus(`Opacity: ${Math.round(michlerOpacity * 100)}%`, 1500);
});

// Re-centre on GPS
document.getElementById('btn-center').addEventListener('click', () => {
  if (gpsLatLng) {
    map.setView(gpsLatLng, 15);
  } else {
    showStatus('No GPS fix yet', 2000);
  }
});

// ═══════════════════════════════════════════════════════════════════════════
// GPS
// ═══════════════════════════════════════════════════════════════════════════

let gpsMarker = null;
let accuracyCircle = null;
let firstFix = true;

const gpsIcon = L.divIcon({
  className: '',
  html: '<div class="gps-dot"></div>',
  iconSize: [16, 16], iconAnchor: [8, 8]
});

function onPosition(pos) {
  const { latitude: lat, longitude: lng, accuracy } = pos.coords;
  gpsLatLng = L.latLng(lat, lng);

  document.getElementById('coords').textContent =
    `${lat.toFixed(6)}°N   ${lng.toFixed(6)}°W   ±${Math.round(accuracy)} m`;

  // Place or move the GPS dot
  if (!gpsMarker) {
    gpsMarker = L.marker(gpsLatLng, { icon: gpsIcon, zIndexOffset: 2000 }).addTo(map);
    accuracyCircle = L.circle(gpsLatLng, {
      radius: accuracy,
      color: '#ef4444', fillColor: '#ef4444',
      fillOpacity: 0.08, weight: 1.5
    }).addTo(map);
  } else {
    gpsMarker.setLatLng(gpsLatLng);
    accuracyCircle.setLatLng(gpsLatLng).setRadius(accuracy);
  }

  // On first fix, fly to location and load correct sheets
  if (firstFix) {
    firstFix = false;
    map.setView(gpsLatLng, 15);
    showStatus('GPS lock ✓', 2000);
  }

  // Always re-evaluate which sheets to show after a GPS update,
  // so the sheet under the dot is guaranteed to be loaded.
  updateLayers();
}

function onGpsError(err) {
  const msgs = {
    1: 'Location access denied — check Safari Settings → Privacy → Location',
    2: 'Position unavailable',
    3: 'GPS timed out — retrying…'
  };
  showStatus(msgs[err.code] || err.message, 5000);
  document.getElementById('coords').textContent = 'GPS unavailable';
}

if (navigator.geolocation) {
  showStatus('Acquiring GPS…', 0);
  navigator.geolocation.watchPosition(onPosition, onGpsError, {
    enableHighAccuracy: true,
    timeout: 20000,
    maximumAge: 0
  });
} else {
  showStatus('Geolocation not supported in this browser', 0);
}
</script>
</body>
</html>
